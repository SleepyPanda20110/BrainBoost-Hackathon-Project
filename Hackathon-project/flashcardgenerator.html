    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

</head>
</body>
<body>

  <div class="menu-container">
    <div class="hamburger" id="hamburgerButton">
      <div></div>
      <div></div>
      <div></div>
    </div>

    <div class="dropdown" id="dropdownMenu">
      <a href="mainPage.html">Home Page</a>
      <a href="flashCardDisplay.html">Your Flashcards</a>
      <a href="assignmentListPage.html">Asignment List</a>
      <a href="minigame.html">Minigame</a>
      <a href="gameQuestionsPage.html">Game Questions</a>
    </div>
  </div>
<div class="flashcard_Box">                                                           
  <button onclick="enterFlashcard()">Add Flashcard</button>

  <form class="flashcard-form">
    <div class="form-row">
      <label for="question">Question:</label>
      <input type="text" id="questionInput" name="question">
    </div>

    <div class="form-row">
      <label for="answer">Answer:</label>
      <input type="text" id="answerInput" name="answer">
    </div>
  </form>
</div>
  <script>
    const button = document.getElementById("hamburgerButton");
    const menu = document.getElementById("dropdownMenu");

    button.addEventListener("click", function (event) {
      event.stopPropagation(); // prevent closing immediately
      menu.classList.toggle("show");
    });

    window.addEventListener("click", function (event) {
      if (!menu.contains(event.target) && !button.contains(event.target)) {
        menu.classList.remove("show");
      }

    });
 
 

  </script>

</body>
